    <style data-gg99-preboot>
      #gg99-preboot {
        display: none;
      }

      html.gg99-preboot body {
        margin: 0;
        background: #f8d6dc;
      }

      html.gg99-preboot #root {
        visibility: hidden;
      }

      html.gg99-preboot #gg99-preboot {
        position: fixed;
        inset: 0;
        z-index: 10000;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
        background:
          radial-gradient(85% 70% at 50% 42%, #fff4f7 0%, #f8d6dc 34%, #f5c2cb 62%, #e9aab8 100%),
          linear-gradient(135deg, rgba(255, 255, 255, 0.16), rgba(178, 58, 82, 0.08));
        color: #6e2431;
        font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      }

      html.gg99-preboot #gg99-preboot::before {
        content: '';
        position: absolute;
        inset: 0;
        background-image:
          linear-gradient(rgba(128, 36, 58, 0.06) 1px, transparent 1px),
          linear-gradient(90deg, rgba(128, 36, 58, 0.06) 1px, transparent 1px);
        background-size: 56px 56px;
        mask-image: radial-gradient(circle at 50% 50%, #000 0%, transparent 75%);
        -webkit-mask-image: radial-gradient(circle at 50% 50%, #000 0%, transparent 75%);
        opacity: 0.55;
      }

      .gg99-preboot__inner {
        position: relative;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 18px;
        text-align: center;
      }

      .gg99-preboot__logo {
        width: 170px;
        height: 170px;
        object-fit: contain;
        filter: drop-shadow(0 0 22px rgba(166, 48, 70, 0.22));
      }

      .gg99-preboot__brand {
        font-size: 20px;
        font-weight: 800;
        letter-spacing: 8px;
      }

      .gg99-preboot__tagline {
        margin-top: -10px;
        font-size: 10px;
        letter-spacing: 4px;
        text-transform: uppercase;
        color: rgba(110, 36, 49, 0.58);
      }

      .gg99-preboot__bar {
        width: 210px;
        height: 2px;
        overflow: hidden;
        border-radius: 999px;
        background: rgba(110, 36, 49, 0.16);
      }

      .gg99-preboot__bar::after {
        content: '';
        display: block;
        width: 45%;
        height: 100%;
        border-radius: inherit;
        background: linear-gradient(90deg, transparent 0%, #b23a52 35%, #fff1f4 100%);
        animation: gg99-preboot-slide 900ms ease-in-out infinite alternate;
      }

      @keyframes gg99-preboot-slide {
        from {
          transform: translateX(-80%);
        }
        to {
          transform: translateX(220%);
        }
      }
    </style>
    <!-- Theme init: set .dark before render to avoid FOUC. -->
    <script>

        try {
          var t = localStorage.getItem('gg99-theme');
          if (t === 'dark') document.documentElement.classList.add('dark');
        } catch (e) {}
      })();
    </script>
